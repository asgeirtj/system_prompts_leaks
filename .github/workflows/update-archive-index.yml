name: Update Archive Index

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.xml'
      - '**/*.json'
      - 'scripts/build-site-index.mjs'
      - '!docs/**'

concurrency:
  group: update-archive-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate site index
        run: node scripts/build-site-index.mjs

      - name: Commit and push if changed
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/index.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update archive index [skip ci]"
            git pull --rebase origin "$GITHUB_REF"
            git push
          fi
